services:
  - type: web
    name: link-shortener
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linkshortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: linkshortener-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CACHE_TTL
        value: "300"
      - key: UNUSED_LINKS_DAYS
        value: "0"

  - type: redis
    name: linkshortener-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: linkshortener-db
    plan: free
    databaseName: linkshortener
    user: postgres
